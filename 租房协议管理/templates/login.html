{% extends "base.html" %}
{% block title %}登录 - 租房协议管理系统{% endblock %}
{% block content %}
<div class="login-container">
    <div class="card">
        <div class="card-body p-4">
            <h3 class="text-center mb-4"><i class="bi bi-house-door-fill text-primary"></i> 租房协议管理系统</h3>
            <form method="post">
                <div class="mb-3">
                    <label class="form-label">用户名</label>
                    <input type="text" name="username" class="form-control" placeholder="请输入用户名" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">密码</label>
                    <input type="password" name="password" class="form-control" placeholder="请输入密码" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">登 录</button>
            </form>
            <div class="text-center mt-3">
                <a href="{{ url_for('register') }}" class="text-decoration-none">还没有账号？立即注册</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
