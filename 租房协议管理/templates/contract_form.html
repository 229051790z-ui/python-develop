{% extends "base.html" %}
{% block title %}{{ '编辑合同' if contract else '新建合同' }}{% endblock %}
{% block content %}
<h4 class="mb-3"><i class="bi bi-file-text"></i> {{ '编辑合同' if contract else '新建合同' }}</h4>

<div class="card">
    <div class="card-body">
        <form method="post">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">合同编号 <span class="text-danger">*</span></label>
                    <input type="text" name="contract_no" class="form-control" value="{{ contract.contract_no if contract else '' }}" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">支付方式</label>
                    <select name="payment_method" class="form-select">
                        {% for pm in ['月付', '季付', '半年付', '年付'] %}
                        <option value="{{ pm }}" {% if contract and contract.payment_method == pm %}selected{% endif %}>{{ pm }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">房源 <span class="text-danger">*</span></label>
                    <select name="property_id" class="form-select" required>
                        <option value="">-- 请选择房源 --</option>
                        {% for p in properties %}
                        <option value="{{ p.id }}" {% if contract and contract.property_id == p.id %}selected{% endif %}>
                            {{ p.title }} - {{ p.address }} ({{ p.rent_amount }}元/月)
                        </option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">租客 <span class="text-danger">*</span></label>
                    <select name="tenant_id" class="form-select" required>
                        <option value="">-- 请选择租客 --</option>
                        {% for t in tenants %}
                        <option value="{{ t.id }}" {% if contract and contract.tenant_id == t.id %}selected{% endif %}>
                            {{ t.name }} - {{ t.phone }}
                        </option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-3 mb-3">
                    <label class="form-label">开始日期 <span class="text-danger">*</span></label>
                    <input type="date" name="start_date" class="form-control" value="{{ contract.start_date if contract else '' }}" required>
                </div>
                <div class="col-md-3 mb-3">
                    <label class="form-label">结束日期 <span class="text-danger">*</span></label>
                    <input type="date" name="end_date" class="form-control" value="{{ contract.end_date if contract else '' }}" required>
                </div>
                <div class="col-md-3 mb-3">
                    <label class="form-label">月租(元) <span class="text-danger">*</span></label>
                    <input type="number" step="0.01" name="monthly_rent" class="form-control" value="{{ contract.monthly_rent if contract else '' }}" required>
                </div>
                <div class="col-md-3 mb-3">
                    <label class="form-label">押金(元) <span class="text-danger">*</span></label>
                    <input type="number" step="0.01" name="deposit" class="form-control" value="{{ contract.deposit if contract else '' }}" required>
                </div>
                <div class="col-12 mb-3">
                    <label class="form-label">特别条款</label>
                    <textarea name="special_terms" class="form-control" rows="3" placeholder="填写合同中的特别约定条款">{{ contract.special_terms if contract else '' }}</textarea>
                </div>
            </div>
            <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg"></i> 保存</button>
            <a href="{{ url_for('contracts') }}" class="btn btn-secondary">取消</a>
        </form>
    </div>
</div>
{% endblock %}
